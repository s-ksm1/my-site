<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="PARA notebook in the browser — projects, areas, resources, archives, sync, and search."
    />
    <meta name="theme-color" content="#ffffff" />
    <title>My Second Brain</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <a class="skip-link" id="skip-to-content" href="#main-content">Skip to content</a>
    <div id="offline-banner" class="offline-banner hidden" role="status" aria-live="polite"></div>
    <div id="auth-view" class="card auth">
      <aside class="auth-side" aria-label="Appearance">
        <div class="auth-toggles">
          <div class="segment-label" id="auth-theme-label">Theme</div>
          <div class="segment-toggle segment-toggle--theme" id="auth-theme-seg" data-setting="theme" role="group"></div>
          <div class="segment-label" id="auth-lang-label">Language</div>
          <div class="segment-toggle segment-toggle--lang" id="auth-lang-seg" data-setting="lang" role="group"></div>
        </div>
      </aside>
      <div class="auth-main">
        <section class="auth-pitch" id="auth-pitch" aria-labelledby="auth-pitch-title">
          <p class="auth-pitch__title" id="auth-pitch-title" role="heading" aria-level="2"></p>
          <p class="auth-pitch__body" id="auth-pitch-body"></p>
        </section>
        <h1 id="auth-title">My Second Brain</h1>
        <p id="auth-subtitle">PARA: Projects / Areas / Resources / Archives</p>
        <input id="email" type="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Password (min 6)" />
        <div class="row">
          <button id="register-btn">Register</button>
          <button id="login-btn">Login</button>
        </div>
        <p id="auth-error" class="error"></p>
        <small class="creator-signature">Создатель: Сергей Курбанов</small>
      </div>
    </div>

    <div id="app-view" class="hidden">
      <header>
        <div>
          <h2>My Second Brain</h2>
          <small id="me"></small>
        </div>
        <div class="header-actions">
          <div
            class="segment-toggle segment-toggle--theme"
            id="app-theme-seg"
            data-setting="theme"
            role="group"
            aria-label="Theme"
          ></div>
          <div class="segment-toggle segment-toggle--lang" id="app-lang-seg" data-setting="lang" role="group" aria-label="Language"></div>
          <button id="logout-btn">Logout</button>
        </div>
      </header>

      <main id="main-content" tabindex="-1">
        <aside class="card sidebar-rail" id="aside-panel">
          <div class="sidebar-tree-wrap" id="sidebar-tree-section">
            <div class="sidebar-tree-head" id="sidebar-folders-heading">Folders</div>
            <p class="sidebar-tree-hint" id="sidebar-tree-hint"></p>
            <nav class="folder-tree" id="folder-tree" aria-label="Folders"></nav>
          </div>
          <section class="panel-block sidebar-settings" data-mobile-panel="settings">
            <details id="settings-drawer">
              <summary id="customization-heading">Settings</summary>
              <div class="settings-drawer-body">
                <section class="settings-section" aria-labelledby="settings-section-profile-title">
                  <h4 class="settings-section-title" id="settings-section-profile-title"></h4>
                  <input id="avatar-emoji" type="text" placeholder="Avatar emoji (e.g. 🚀)" maxlength="3" />
                  <input id="display-name" type="text" placeholder="Display name" />
                  <input id="app-title" type="text" placeholder="App title" />
                </section>

                <section class="settings-section" aria-labelledby="settings-section-appearance-title">
                  <h4 class="settings-section-title" id="settings-section-appearance-title"></h4>
                  <select id="accent-color" aria-label="Accent color">
                    <option value="blue">Accent: Blue</option>
                    <option value="purple">Accent: Purple</option>
                    <option value="green">Accent: Green</option>
                    <option value="orange">Accent: Orange</option>
                  </select>
                  <select id="font-family" aria-label="Font family">
                    <option value="sans">Font: Sans</option>
                    <option value="serif">Font: Serif</option>
                    <option value="mono">Font: Mono</option>
                  </select>
                  <select id="bg-pattern" aria-label="Background pattern">
                    <option value="none">Background: None</option>
                    <option value="dots">Background: Dots</option>
                    <option value="grid">Background: Grid</option>
                  </select>
                  <select id="density-mode" aria-label="Density mode">
                    <option value="cozy">Density: Cozy</option>
                    <option value="compact">Density: Compact</option>
                  </select>
                  <select id="motion-mode" aria-label="Motion mode">
                    <option value="smooth">Motion: Smooth</option>
                    <option value="reduced">Motion: Reduced</option>
                  </select>
                  <select id="sidebar-width" aria-label="Sidebar width">
                    <option value="comfortable">Sidebar: Comfortable</option>
                    <option value="narrow">Sidebar: Compact</option>
                  </select>
                </section>

                <section class="settings-section" aria-labelledby="settings-section-links-title">
                  <h4 class="settings-section-title" id="settings-section-links-title"></h4>
                  <input id="profile-link" type="url" placeholder="Your link (https://...)" />
                  <a id="pretty-link" class="pretty-link hidden" href="#" target="_blank" rel="noopener noreferrer"></a>
                </section>

                <section class="settings-section" aria-labelledby="settings-section-data-title">
                  <h4 class="settings-section-title" id="settings-section-data-title"></h4>
                  <p class="settings-subheading" id="share-website-heading"></p>
                  <input id="public-site-link" type="text" readonly placeholder="Run go-online.cmd to get link" />
                  <div class="row">
                    <button id="refresh-public-link-btn" type="button">Refresh link</button>
                    <button id="copy-public-link-btn" type="button">Copy link</button>
                  </div>
                  <div class="row">
                    <button id="export-settings-btn" type="button">Export settings</button>
                    <button id="import-settings-btn" type="button">Import settings</button>
                  </div>
                  <input id="import-settings-file" type="file" accept="application/json" class="hidden" />
                </section>

                <section class="settings-section" aria-labelledby="settings-section-support-title">
                  <h4 class="settings-section-title" id="settings-section-support-title"></h4>
                  <p class="settings-subheading" id="report-issue-heading"></p>
                  <textarea id="issue-text" placeholder="Describe the issue"></textarea>
                  <button id="send-issue-btn">Send to developer</button>
                </section>
              </div>
            </details>
          </section>
        </aside>

        <section class="card grow">
          <div class="toolbar" id="notes-toolbar">
            <input id="search" type="text" placeholder="Search notes..." />
            <small id="active-folder-label"></small>
            <button id="clear-folder-btn" type="button" class="hidden">All folders</button>
            <small id="sync-status" aria-live="polite"></small>
          </div>
          <div class="main-column">
            <section class="create-column panel-block" data-mobile-panel="create" id="create-panel">
              <h3 id="create-note-heading">Create note</h3>
              <input id="note-title" type="text" placeholder="Title" />
              <select id="note-category">
                <option value="projects">Projects</option>
                <option value="areas">Areas</option>
                <option value="resources" selected>Resources</option>
                <option value="archives">Archives</option>
              </select>
              <textarea id="note-content" placeholder="Write your thought..."></textarea>
              <button id="create-note-btn">Create</button>
            </section>
            <div class="notes-main" id="notes-main" data-mobile-panel="notes">
              <div class="notes-column">
                <div id="notes"></div>
              </div>
            </div>
          </div>
        </section>
      </main>
      <nav class="mobile-nav hidden" id="mobile-nav">
        <button type="button" data-mobile-target="notes" class="active" id="mobile-nav-notes">Notes</button>
        <button type="button" data-mobile-target="create" id="mobile-nav-create">Create</button>
        <button type="button" data-mobile-target="settings" id="mobile-nav-settings">Settings</button>
      </nav>
      <footer class="app-footer">Сергей Курбанов</footer>
    </div>

    <div id="toast-host" class="toast-host" aria-live="polite" aria-atomic="true"></div>

    <script src="/app.js"></script>
  </body>
  </html>
