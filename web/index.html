<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta id="meta-description" name="description" content="" />
    <meta name="theme-color" content="#f3f4f6" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>My Second Brain</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>

    <div id="offline-banner" class="offline-banner hidden" role="status" aria-live="polite"></div>
    <div id="auth-view" class="auth-view">
      <aside class="auth-side" id="auth-side" aria-label="">
        <div class="auth-toggles">
          <div class="segment-label" id="auth-theme-label"></div>
          <div class="segment-toggle segment-toggle--theme" id="auth-theme-seg" data-setting="theme" role="group"></div>
          <div class="segment-label" id="auth-lang-label"></div>
          <div class="segment-toggle segment-toggle--lang" id="auth-lang-seg" data-setting="lang" role="group"></div>
        </div>
      </aside>
      <div class="auth-main">
        <section class="auth-pitch" id="auth-pitch" aria-labelledby="auth-pitch-title">
          <p class="auth-pitch__title" id="auth-pitch-title" role="heading" aria-level="2"></p>
          <p class="auth-pitch__body" id="auth-pitch-body"></p>
        </section>
        <h1 id="auth-title"></h1>
        <p id="auth-subtitle"></p>
        <input id="email" type="email" placeholder="" />
        <input id="password" type="password" placeholder="" />
        <div class="row">
          <button id="register-btn" type="button"></button>
          <button id="login-btn" type="button"></button>
        </div>
        <p id="auth-error" class="error"></p>
        <p class="auth-user-stats" id="auth-user-stats" aria-live="polite"></p>
        <small class="creator-signature" id="creator-signature"></small>
      </div>
    </div>

    <div id="app-view" class="hidden">
      <header>
        <div>
          <h2 id="header-app-title"></h2>
          <small id="me"></small>
        </div>
        <div class="header-actions">

          <div
            class="segment-toggle segment-toggle--theme"
            id="app-theme-seg"
            data-setting="theme"
            role="group"
            aria-label=""
          ></div>
          <div
            class="segment-toggle segment-toggle--lang"
            id="app-lang-seg"
            data-setting="lang"
            role="group"
            aria-label=""
          ></div>
          <button id="logout-btn" type="button"></button>
        </div>
      </header>

      <main id="main-content" tabindex="-1">
        <aside class="sidebar-rail" id="aside-panel">
          <div class="sidebar-tree-wrap" id="sidebar-tree-section">
            <div class="sidebar-tree-head" id="sidebar-folders-heading"></div>
            <p class="sidebar-tree-hint" id="sidebar-tree-hint"></p>
            <details class="sidebar-about" id="sidebar-about">
              <summary class="sidebar-about-summary" id="about-app-summary"></summary>
              <div class="sidebar-about-body" id="about-app-body"></div>
            </details>
            <nav class="folder-tree" id="folder-tree" aria-label=""></nav>
          </div>
          <section class="panel-block sidebar-settings" data-mobile-panel="settings">
            <details id="settings-drawer">
              <summary id="customization-heading"></summary>
              <div class="settings-drawer-body">
                <section class="settings-section" aria-labelledby="settings-section-profile-title">
                  <h4 class="settings-section-title" id="settings-section-profile-title"></h4>
                  <input id="avatar-emoji" type="text" placeholder="" maxlength="3" />
                  <input id="display-name" type="text" placeholder="" />
                  <input id="app-title" type="text" placeholder="" />
                </section>

                <section class="settings-section" aria-labelledby="settings-section-appearance-title">
                  <h4 class="settings-section-title" id="settings-section-appearance-title"></h4>
                  <select id="accent-color" aria-label="">
                    <option value="blue"></option>
                    <option value="purple"></option>
                    <option value="green"></option>
                    <option value="orange"></option>
                  </select>
                  <select id="font-family" aria-label="">
                    <option value="sans"></option>
                    <option value="serif"></option>
                    <option value="mono"></option>
                  </select>
                  <select id="bg-pattern" aria-label="">
                    <option value="none"></option>
                    <option value="dots"></option>
                    <option value="grid"></option>
                  </select>
                  <select id="density-mode" aria-label="">
                    <option value="cozy"></option>
                    <option value="compact"></option>
                  </select>
                  <select id="motion-mode" aria-label="">
                    <option value="smooth"></option>
                    <option value="reduced"></option>
                  </select>
                  <select id="sidebar-width" aria-label="">
                    <option value="comfortable"></option>
                    <option value="narrow"></option>
                  </select>
                </section>

                <section class="settings-section" aria-labelledby="settings-section-links-title">
                  <h4 class="settings-section-title" id="settings-section-links-title"></h4>
                  <input id="profile-link" type="url" placeholder="" />
                  <a id="pretty-link" class="pretty-link hidden" href="#" target="_blank" rel="noopener noreferrer"></a>
                </section>

                <section class="settings-section" aria-labelledby="settings-section-data-title">
                  <h4 class="settings-section-title" id="settings-section-data-title"></h4>
                  <p class="settings-subheading" id="share-website-heading"></p>
                  <input id="public-site-link" type="text" readonly placeholder="" />
                  <div class="row">
                    <button id="refresh-public-link-btn" type="button"></button>
                    <button id="copy-public-link-btn" type="button"></button>
                  </div>
                  <div class="row">
                    <button id="export-settings-btn" type="button"></button>
                    <button id="import-settings-btn" type="button"></button>
                  </div>
                  <input id="import-settings-file" type="file" accept="application/json" class="hidden" />
                </section>

                <section class="settings-section" aria-labelledby="settings-section-support-title">
                  <h4 class="settings-section-title" id="settings-section-support-title"></h4>
                  <p class="settings-subheading" id="report-issue-heading"></p>
                  <textarea id="issue-text" placeholder=""></textarea>
                  <button id="send-issue-btn" type="button"></button>
                </section>

                <section class="settings-section" aria-labelledby="settings-section-account-title">
                  <h4 class="settings-section-title" id="settings-section-account-title"></h4>
                  <p class="settings-subheading settings-danger-hint" id="delete-account-warning"></p>
                  <input
                    id="delete-account-password"
                    type="password"
                    autocomplete="current-password"
                    placeholder=""
                  />
                  <button type="button" class="danger" id="delete-account-btn"></button>
                </section>
              </div>
            </details>
          </section>
        </aside>

        <section class="main-content-area grow">
          <div class="toolbar" id="notes-toolbar">
            <div class="toolbar-primary">
              <input id="search" type="text" placeholder="" />
              <small id="active-folder-label"></small>
              <button id="clear-folder-btn" type="button" class="hidden"></button>
            </div>
            <button type="button" id="toolbar-new-note" class="toolbar-new-note hidden"></button>
          </div>
          <div class="main-column">

            <div class="notes-main" id="notes-main" data-mobile-panel="notes">
              <div class="notes-column">
                <div id="notes"></div>
              </div>
            </div>
          </div>
        </section>
      </main>
      <nav class="mobile-nav hidden" id="mobile-nav">
        <button type="button" data-mobile-target="notes" class="active" id="mobile-nav-notes"></button>
        <button type="button" data-mobile-target="create" id="mobile-nav-create"></button>
        <button type="button" data-mobile-target="settings" id="mobile-nav-settings"></button>
      </nav>
      <footer class="app-footer" id="app-footer-author"></footer>
    </div>

    <div id="toast-host" class="toast-host" aria-live="polite" aria-atomic="true"></div>

    <div id="tutorial-overlay" class="tutorial-overlay hidden">
      <div class="tutorial-tooltip">
        <h3 id="tutorial-title">Welcome!</h3>
        <p id="tutorial-text">Let's take a quick tour.</p>
        <div class="tutorial-actions">
          <button id="tutorial-skip" class="secondary">Skip</button>
          <button id="tutorial-next">Next</button>
        </div>
      </div>
    </div>

    <!-- Notion-style Editor Overlay -->
    <div id="notion-editor-overlay" class="notion-editor-overlay hidden">
      <div class="notion-editor-backdrop" id="notion-editor-backdrop"></div>
      <div class="notion-editor-container">
        <div class="notion-editor-toolbar">
          <button type="button" class="notion-btn-back" id="notion-back-btn">← Back</button>
          <div class="notion-editor-meta">
            <span id="notion-status" class="notion-status">Saved</span>
          </div>
          <button type="button" class="notion-btn-close" id="notion-close-btn">✕</button>
        </div>
        
        <div class="notion-content-scroll">
          <div class="notion-cover-wrapper" id="notion-cover-area">
            <!-- Cover image will be injected here -->
          </div>
          
          <div class="notion-editor-body">
            <div class="notion-icon-wrapper" id="notion-icon-area">
              <span class="notion-icon" id="notion-emoji">📄</span>
            </div>
            
            <input type="text" id="notion-title" class="notion-title-input" placeholder="Untitled" />
            
            <div id="notion-blocks" class="notion-blocks-container">
              <!-- Blocks will be injected here -->
            </div>
          </div>
        </div>
      </div>

      <!-- Slash Command Menu -->
      <div id="slash-menu" class="slash-menu hidden">
        <div class="slash-menu-items" id="slash-menu-list">
          <!-- Menu items injected by JS -->
        </div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
  </html>
