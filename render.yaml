services:
  - type: web
    name: my-second-brain
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/public-link
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: APP_ENCRYPTION_KEY
        generateValue: true
      - key: TRUST_PROXY
        value: "true"
